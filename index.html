<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Versusfy | Futuristic Product Comparison Engine</title>
    <meta name="description" content="Versusfy provides clear, data-driven insights to help you make informed purchasing decisions with our minimalist, futuristic product comparison engine." />
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "url": "https://www.versusfy.com/",
      "name": "Versusfy",
      "description": "Minimalist futuristic product comparison engine.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://www.versusfy.com/?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
